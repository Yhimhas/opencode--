name: Harness CI

on:
  pull_request:
    paths:
      - "opencode-harness-kit/**"
      - "scripts/integrate-into-opencode.mjs"
      - "package.json"
      - ".github/workflows/harness-ci.yml"
  push:
    branches: [main, master]
    paths:
      - "opencode-harness-kit/**"
      - "scripts/integrate-into-opencode.mjs"
      - "package.json"
      - ".github/workflows/harness-ci.yml"

jobs:
  harness-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run harness lint
        run: npm run harness:lint

      - name: Run harness format check
        run: npm run harness:format:check

      - name: Run harness tests
        run: npm run harness:test

      - name: Run harness validate
        run: npm run harness:validate
