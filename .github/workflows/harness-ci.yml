name: Harness CI

on:
  pull_request:
    paths:
      - "opencode-harness-kit/**"
      - "scripts/integrate-into-opencode.mjs"
      - "package.json"
      - ".github/workflows/harness-ci.yml"
  push:
    branches: [main, master]
    paths:
      - "opencode-harness-kit/**"
      - "scripts/integrate-into-opencode.mjs"
      - "package.json"
      - ".github/workflows/harness-ci.yml"

jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run harness CI checks
        run: npm run harness:ci
